<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PwGuard</title>
    <style>
      body {
        width: 280px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        color: #222;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 16px;
        color: #333;
      }
      input {
        width: 100%;
        padding: 8px;
        margin-bottom: 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 9px;
        margin-bottom: 6px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
      }
      #login-btn {
        background: #4f8ef7;
        color: #fff;
      }
      #signup-btn {
        background: #eee;
        color: #333;
      }
      #logout-btn {
        background: #f55;
        color: #fff;
      }
      #success-section {
        display: none;
      }
      #user-email {
        font-weight: bold;
        color: #4f8ef7;
        margin-bottom: 12px;
      }
      #status-msg {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h2>🔒 PwGuard</h2>

    <div id="auth-section">
      <input type="email" id="email" placeholder="이메일" />
      <input type="password" id="password" placeholder="비밀번호" />
      <button id="login-btn">로그인</button>
      <button id="signup-btn">회원가입</button>
      <div id="status-msg"></div>
    </div>

    <div id="success-section">
      <p id="user-email"></p>
      <p style="color: #555; font-size: 13px">
        로그인 상태입니다.<br />비밀번호 입력창에서 보안 분석이 자동으로
        실행됩니다.
      </p>
      <button id="logout-btn">로그아웃</button>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
